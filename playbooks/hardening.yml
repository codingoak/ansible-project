---
###############################################################
# RHEL 10.1 – Complete CIS L2 Hardening Playbook
# Purpose: CIS L2 Server Hardening
# Access: SSH key-only from Control Node
#
# OpenSCAP target: CIS RHEL 10 Benchmark L2 – Server (v1.0.1)
#
# Usage:
#   ansible-playbook hardening.yml --check --diff
#   ansible-playbook hardening.yml
#   ansible-playbook hardening.yml --tags ssh,sysctl
#
# WARNING: Always test in a non-production environment first!
# WARNING: Keep a second SSH session open when applying SSH changes!
###############################################################

- name: RHEL 10.1 CIS L2 Complete Hardening
  hosts: managed
  become: true

  vars:
    # ╔═══════════════════════════════════════════════════╗
    # ║  USER CONFIGURATION – Adjust these to your setup  ║
    # ╚═══════════════════════════════════════════════════╝

    # IP of the control node (only host allowed to SSH in)
    control_node_ip: "192.168.x.x"

    # Kernel IP forwarding (enable only if this host routes traffic, e.g. K8s)
    kernel_ip_forward: "0"
    kernel_ip_forward_v6: "0"

    # ╔═══════════════════════════════════════════════════╗
    # ║  CIS DEFAULTS – Usually no changes needed         ║
    # ╚═══════════════════════════════════════════════════╝

    # ── SSH ────────────────────────────────────────────
    ssh_port: 22
    ssh_idle_timeout: 300             # ClientAliveInterval (seconds)
    ssh_alive_count_max: 3
    ssh_max_auth_tries: 3
    ssh_max_sessions: 10
    ssh_max_startups: "10:30:60"
    ssh_login_grace_time: 60

    # ── Password policies ─────────────────────────────
    password_min_length: 14
    password_max_days: 365
    password_min_days: 1
    password_warn_days: 7
    password_inactive_days: 30
    password_remember: 24             # Reject last N passwords
    faillock_attempts: 5              # Lock after N failed attempts
    faillock_unlock_time: 900         # Unlock after N seconds

    # ── Session ───────────────────────────────────────
    session_timeout: 900              # TMOUT in seconds
    default_umask: "027"

    # ── Audit ─────────────────────────────────────────
    audit_buffer_size: 8192
    audit_backlog_limit: 8192

    # ── AIDE schedule (daily integrity check) ─────────
    aide_cron_minute: "5"
    aide_cron_hour: "4"

    # ── Shared memory ─────────────────────────────────
    shm_size: "512m"

    # ── Packages to remove ────────────────────────────
    packages_to_remove:
      - telnet
      - rsh
      - rsh-server
      - ypbind
      - ypserv
      - tftp
      - tftp-server
      - vsftpd
      - httpd
      - dovecot
      - squid
      - net-snmp
      - samba

    # ── Services to disable ───────────────────────────
    services_to_disable:
      - bluetooth
      - avahi-daemon
      - cups
      - cockpit.socket
      - cockpit

    # ── Kernel modules to blacklist ───────────────────
    kernel_module_blacklist:
      # Filesystems
      - cramfs
      - freevxfs
      - hfs
      - hfsplus
      - jffs2
      - overlayfs
      - squashfs
      - udf
      # USB storage
      - usb-storage
      # Network protocols
      - atm
      - can
      - dccp
      - firewire-core
      - rds
      - sctp
      - tipc

    # ── Login banner ──────────────────────────────────
    login_banner: |
      Authorized access only. Unauthorized access is prohibited.
      All activity is logged and monitored.

  ###############################################################
  # TASKS
  ###############################################################
  tasks:

    # ═══════════════════════════════════════════════════
    #  BLOCK 01: SYSTEM UPDATES
    # ═══════════════════════════════════════════════════

    - name: "[01] Update all packages to latest"
      ansible.builtin.dnf:
        name: "*"
        state: latest
      tags: [update]

    - name: "[01] Install dnf-automatic"
      ansible.builtin.dnf:
        name: dnf-automatic
        state: present
      tags: [update]

    - name: "[01] Enable automatic security updates"
      ansible.builtin.systemd:
        name: dnf-automatic-install.timer
        enabled: true
        state: started
      tags: [update]

    - name: "[01] Disable weak dependencies in DNF"
      ansible.builtin.lineinfile:
        path: /etc/dnf/dnf.conf
        regexp: '^install_weak_deps'
        line: 'install_weak_deps=False'
        insertafter: '^\[main\]'
      tags: [update]

    # ═══════════════════════════════════════════════════
    #  BLOCK 02: REMOVE INSECURE PACKAGES
    # ═══════════════════════════════════════════════════

    - name: "[02] Remove insecure packages"
      ansible.builtin.dnf:
        name: "{{ packages_to_remove }}"
        state: absent
      tags: [packages]

    # ═══════════════════════════════════════════════════
    #  BLOCK 03: SELINUX
    # ═══════════════════════════════════════════════════

    - name: "[03] Check SELinux status"
      ansible.builtin.command: getenforce
      register: selinux_status
      changed_when: false
      tags: [selinux]

    - name: "[03] Set SELinux to enforcing (persistent)"
      ansible.builtin.lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        line: 'SELINUX=enforcing'
        backup: yes
      tags: [selinux]

    - name: "[03] Set SELinux to enforcing (runtime)"
      ansible.builtin.command: setenforce 1
      when: selinux_status.stdout != "Enforcing"
      tags: [selinux]

    # ═══════════════════════════════════════════════════
    #  BLOCK 04: CRYPTO POLICY
    # ═══════════════════════════════════════════════════

    - name: "[04] Create crypto policy module directory"
      ansible.builtin.file:
        path: /etc/crypto-policies/policies/modules
        state: directory
        mode: '0755'
      tags: [crypto]

    - name: "[04] Create CIS crypto policy module"
      ansible.builtin.copy:
        dest: /etc/crypto-policies/policies/modules/CIS.pmod
        mode: '0644'
        content: |
          min_dh_size = 2048
          min_rsa_size = 2048
          sha1_in_certs = 0
          ssh_certs = 0
          ssh_etm = 0
      notify: apply crypto policy
      tags: [crypto]

    # ═══════════════════════════════════════════════════
    #  BLOCK 05: LOGIN BANNERS
    # ═══════════════════════════════════════════════════

    - name: "[05] Set login banner /etc/issue"
      ansible.builtin.copy:
        dest: /etc/issue
        content: "{{ login_banner }}"
        owner: root
        group: root
        mode: '0644'
      tags: [banner]

    - name: "[05] Set login banner /etc/issue.net"
      ansible.builtin.copy:
        dest: /etc/issue.net
        content: "{{ login_banner }}"
        owner: root
        group: root
        mode: '0644'
      tags: [banner]

    - name: "[05] Clear MOTD (prevent OS info leak)"
      ansible.builtin.copy:
        dest: /etc/motd
        content: ""
        owner: root
        group: root
        mode: '0644'
      tags: [banner]

    # ═══════════════════════════════════════════════════
    #  BLOCK 06: SSH COMPLETE HARDENING
    # ═══════════════════════════════════════════════════

    - name: "[06] SSH – Deploy complete hardened configuration"
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/99-hardening.conf
        backup: yes
        owner: root
        group: root
        mode: '0600'
        content: |
          # -- Access control --
          PermitRootLogin no
          PasswordAuthentication no
          PermitEmptyPasswords no
          PubkeyAuthentication yes

          # -- Timeouts --
          ClientAliveInterval {{ ssh_idle_timeout }}
          ClientAliveCountMax {{ ssh_alive_count_max }}
          LoginGraceTime {{ ssh_login_grace_time }}

          # -- Limits --
          MaxAuthTries {{ ssh_max_auth_tries }}
          MaxSessions {{ ssh_max_sessions }}
          MaxStartups {{ ssh_max_startups }}

          # -- Security options --
          HostbasedAuthentication no
          DisableForwarding yes
          GSSAPIAuthentication no
          IgnoreRhosts yes
          PermitUserEnvironment no
          X11Forwarding no
          UsePAM yes

          # -- Logging --
          LogLevel VERBOSE

          # -- Banner --
          Banner /etc/issue.net
      notify: restart sshd
      tags: [ssh]

    # ═══════════════════════════════════════════════════
    #  BLOCK 07: SUDO HARDENING
    # ═══════════════════════════════════════════════════

    - name: "[07] Sudo – Enable use_pty"
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/99-hardening
        line: 'Defaults use_pty'
        create: yes
        owner: root
        group: root
        mode: '0440'
        validate: 'visudo -cf %s'
      tags: [sudo]

    - name: "[07] Sudo – Enable logfile"
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/99-hardening
        line: 'Defaults logfile="/var/log/sudo.log"'
        owner: root
        group: root
        mode: '0440'
        validate: 'visudo -cf %s'
      tags: [sudo]

    # ═══════════════════════════════════════════════════
    #  BLOCK 08: PAM – FAILLOCK + PASSWORD HISTORY
    # ═══════════════════════════════════════════════════

    - name: "[08] Select authselect profile (sssd with faillock)"
      ansible.builtin.command:
        cmd: authselect select sssd with-faillock with-pamaccess --force
      register: authselect_result
      changed_when: "'already' not in authselect_result.stdout"
      failed_when: authselect_result.rc != 0
      tags: [pam]

    - name: "[08] Configure faillock"
      ansible.builtin.copy:
        dest: /etc/security/faillock.conf
        backup: yes
        owner: root
        group: root
        mode: '0644'
        content: |
          # CIS: Lock account after failed login attempts
          deny = {{ faillock_attempts }}
          unlock_time = {{ faillock_unlock_time }}
          even_deny_root
          root_unlock_time = {{ faillock_unlock_time }}
      tags: [pam]

    - name: "[08] Ensure pam_pwquality in system-auth"
      ansible.builtin.lineinfile:
        path: /etc/pam.d/system-auth
        regexp: 'pam_pwquality\.so'
        line: 'password    requisite     pam_pwquality.so retry=3 enforce_for_root'
        insertbefore: 'pam_unix\.so'
      tags: [pam]

    - name: "[08] Ensure pam_pwquality in password-auth"
      ansible.builtin.lineinfile:
        path: /etc/pam.d/password-auth
        regexp: 'pam_pwquality\.so'
        line: 'password    requisite     pam_pwquality.so retry=3 enforce_for_root'
        insertbefore: 'pam_unix\.so'
      tags: [pam]

    - name: "[08] Set password history in system-auth (pam_unix remember)"
      ansible.builtin.replace:
        path: /etc/pam.d/system-auth
        regexp: '(password\s+sufficient\s+pam_unix\.so.*?)(\s+remember=\d+)?$'
        replace: '\1 remember={{ password_remember }} use_authtok'
      tags: [pam]

    - name: "[08] Set password history in password-auth (pam_unix remember)"
      ansible.builtin.replace:
        path: /etc/pam.d/password-auth
        regexp: '(password\s+sufficient\s+pam_unix\.so.*?)(\s+remember=\d+)?$'
        replace: '\1 remember={{ password_remember }} use_authtok'
      tags: [pam]

    - name: "[08] Enable pam_pwhistory for root"
      ansible.builtin.lineinfile:
        path: /etc/pam.d/system-auth
        regexp: 'pam_pwhistory\.so'
        line: 'password    requisite     pam_pwhistory.so remember={{ password_remember }} enforce_for_root use_authtok'
        insertbefore: 'pam_unix\.so'
      tags: [pam]

    # ═══════════════════════════════════════════════════
    #  BLOCK 09: PASSWORD QUALITY REQUIREMENTS
    # ═══════════════════════════════════════════════════

    - name: "[09] Install libpwquality"
      ansible.builtin.dnf:
        name: libpwquality
        state: present
      tags: [password]

    - name: "[09] Set password complexity requirements"
      ansible.builtin.copy:
        dest: /etc/security/pwquality.conf
        backup: yes
        content: |
          minlen = {{ password_min_length }}
          dcredit = -1
          ucredit = -1
          lcredit = -1
          ocredit = -1
          maxrepeat = 3
          maxsequence = 3
          difok = 2
          dictcheck = 1
          minclass = 4
          enforce_for_root
      tags: [password]

    - name: "[09] Set PASS_MAX_DAYS in login.defs"
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_MAX_DAYS'
        line: "PASS_MAX_DAYS   {{ password_max_days }}"
      tags: [password]

    - name: "[09] Set PASS_MIN_DAYS in login.defs"
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_MIN_DAYS'
        line: "PASS_MIN_DAYS   {{ password_min_days }}"
      tags: [password]

    - name: "[09] Set PASS_WARN_AGE in login.defs"
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_WARN_AGE'
        line: "PASS_WARN_AGE   {{ password_warn_days }}"
      tags: [password]

    - name: "[09] Set inactivity lock for new accounts"
      ansible.builtin.command:
        cmd: "useradd -D -f {{ password_inactive_days }}"
      changed_when: true
      tags: [password]

    - name: "[09] Apply PASS_MIN_DAYS to existing users"
      ansible.builtin.shell: |
        for user in $(awk -F: '($3 >= 1000 && $1 != "nobody") {print $1}' /etc/passwd); do
          chage --mindays {{ password_min_days }} "$user"
        done
      changed_when: true
      tags: [password]

    - name: "[09] Apply PASS_MAX_DAYS to existing users"
      ansible.builtin.shell: |
        for user in $(awk -F: '($3 >= 1000 && $1 != "nobody") {print $1}' /etc/passwd); do
          chage --maxdays {{ password_max_days }} "$user"
        done
      changed_when: true
      tags: [password]

    - name: "[09] Apply inactivity lock to existing users"
      ansible.builtin.shell: |
        for user in $(awk -F: '($3 >= 1000 && $1 != "nobody") {print $1}' /etc/passwd); do
          chage --inactive {{ password_inactive_days }} "$user"
        done
      changed_when: true
      tags: [password]

    # ═══════════════════════════════════════════════════
    #  BLOCK 10: UMASK + SESSION TIMEOUT
    # ═══════════════════════════════════════════════════

    - name: "[10] Set umask in /etc/bashrc"
      ansible.builtin.lineinfile:
        path: /etc/bashrc
        regexp: '^\s*umask\s+'
        line: "umask {{ default_umask }}"
      tags: [umask]

    - name: "[10] Set umask in /etc/profile"
      ansible.builtin.lineinfile:
        path: /etc/profile
        regexp: '^\s*umask\s+'
        line: "umask {{ default_umask }}"
      tags: [umask]

    - name: "[10] Set UMASK in login.defs"
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: '^UMASK'
        line: "UMASK           {{ default_umask }}"
      tags: [umask]

    - name: "[10] Set session timeout (TMOUT)"
      ansible.builtin.copy:
        dest: /etc/profile.d/tmout.sh
        owner: root
        group: root
        mode: '0644'
        content: |
          # CIS: Auto-logout after inactivity
          readonly TMOUT={{ session_timeout }}
          export TMOUT
      tags: [umask]

    - name: "[10] Restrict user initialization file permissions"
      ansible.builtin.shell: |
        for dir in $(awk -F: '($3 >= 1000 && $7 != "/sbin/nologin" && $7 != "/bin/false") {print $6}' /etc/passwd); do
          if [ -d "$dir" ]; then
            for f in "$dir"/.bashrc "$dir"/.bash_profile "$dir"/.profile; do
              [ -f "$f" ] && chmod 0740 "$f" || true
            done
          fi
        done
      changed_when: true
      tags: [umask]

    # ═══════════════════════════════════════════════════
    #  BLOCK 11: RESTRICT ROOT / AUTH
    # ═══════════════════════════════════════════════════

    - name: "[11] Require authentication for single-user mode"
      ansible.builtin.lineinfile:
        path: /usr/lib/systemd/system/rescue.service
        regexp: '^ExecStart='
        line: 'ExecStart=-/usr/lib/systemd/systemd-sulogin-shell rescue'
      tags: [root]

    - name: "[11] Enforce pam_wheel for su"
      ansible.builtin.lineinfile:
        path: /etc/pam.d/su
        regexp: '^#?\s*auth\s+required\s+pam_wheel\.so'
        line: 'auth           required        pam_wheel.so use_uid group=wheel'
      tags: [root]

    - name: "[11] Lock non-interactive system accounts"
      ansible.builtin.shell: |
        for user in $(awk -F: '($3 < 1000 && $1 != "root" && $7 != "/sbin/nologin" && $7 != "/bin/false") {print $1}' /etc/passwd); do
          usermod -L -s /usr/sbin/nologin "$user" 2>/dev/null || true
        done
      changed_when: true
      tags: [root]

    - name: "[11] Remove nologin from /etc/shells"
      ansible.builtin.lineinfile:
        path: /etc/shells
        regexp: 'nologin'
        state: absent
      tags: [root]

    - name: "[11] Block login with empty passwords (remove nullok from pam_unix)"
      ansible.builtin.replace:
        path: "{{ item }}"
        regexp: '(\s+pam_unix\.so.*?)\s*nullok'
        replace: '\1'
      loop:
        - /etc/pam.d/system-auth
        - /etc/pam.d/password-auth
      tags: [root]

    # ═══════════════════════════════════════════════════
    #  BLOCK 12: FIREWALL
    #  SSH: restricted to Control Node IP only
    #  Default zone: drop (all inbound blocked)
    # ═══════════════════════════════════════════════════

    - name: "[12] Install and enable firewalld"
      ansible.builtin.dnf:
        name: firewalld
        state: present
      tags: [firewall]

    - name: "[12] Start firewalld"
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started
      tags: [firewall]

    - name: "[12] Set default zone to drop"
      ansible.builtin.command:
        cmd: firewall-cmd --set-default-zone=drop
      register: fwzone
      changed_when: "'ZONE_ALREADY_SET' not in fwzone.stderr"
      failed_when: false
      tags: [firewall]

    - name: "[12] Allow SSH only from Control Node"
      ansible.posix.firewalld:
        zone: drop
        rich_rule: 'rule family="ipv4" source address="{{ control_node_ip }}" service name="ssh" accept'
        state: enabled
        permanent: true
        immediate: true
      tags: [firewall]

    - name: "[12] Trust loopback traffic"
      ansible.posix.firewalld:
        zone: trusted
        interface: lo
        state: enabled
        permanent: true
        immediate: true
      tags: [firewall]

    # ═══════════════════════════════════════════════════
    #  BLOCK 13: BLACKLIST KERNEL MODULES
    # ═══════════════════════════════════════════════════

    - name: "[13] Blacklist kernel modules and redirect to /bin/false"
      ansible.builtin.copy:
        dest: "/etc/modprobe.d/cis-{{ item }}.conf"
        owner: root
        group: root
        mode: '0644'
        content: |
          # CIS: {{ item }} disabled
          install {{ item }} /bin/false
          blacklist {{ item }}
      loop: "{{ kernel_module_blacklist }}"
      tags: [kernelmodules]

    # ═══════════════════════════════════════════════════
    #  BLOCK 14: SYSCTL – COMPLETE NETWORK HARDENING
    # ═══════════════════════════════════════════════════

    - name: "[14] Apply complete kernel and network hardening via sysctl"
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        # -- IPv4 forwarding --
        - { name: 'net.ipv4.ip_forward',                           value: '{{ kernel_ip_forward }}' }

        # -- IPv4 redirects --
        - { name: 'net.ipv4.conf.all.accept_redirects',            value: '0' }
        - { name: 'net.ipv4.conf.default.accept_redirects',        value: '0' }
        - { name: 'net.ipv4.conf.all.secure_redirects',            value: '0' }
        - { name: 'net.ipv4.conf.default.secure_redirects',        value: '0' }
        - { name: 'net.ipv4.conf.all.send_redirects',              value: '0' }
        - { name: 'net.ipv4.conf.default.send_redirects',          value: '0' }

        # -- IPv4 source routing --
        - { name: 'net.ipv4.conf.all.accept_source_route',         value: '0' }
        - { name: 'net.ipv4.conf.default.accept_source_route',     value: '0' }

        # -- IPv4 reverse path filtering --
        - { name: 'net.ipv4.conf.all.rp_filter',                   value: '1' }
        - { name: 'net.ipv4.conf.default.rp_filter',               value: '1' }

        # -- IPv4 martian logging --
        - { name: 'net.ipv4.conf.all.log_martians',                value: '1' }
        - { name: 'net.ipv4.conf.default.log_martians',            value: '1' }

        # -- IPv4 ICMP --
        - { name: 'net.ipv4.icmp_echo_ignore_broadcasts',          value: '1' }
        - { name: 'net.ipv4.icmp_ignore_bogus_error_responses',    value: '1' }
        - { name: 'net.ipv4.tcp_syncookies',                       value: '1' }

        # -- IPv6 --
        - { name: 'net.ipv6.conf.all.accept_ra',                   value: '0' }
        - { name: 'net.ipv6.conf.default.accept_ra',               value: '0' }
        - { name: 'net.ipv6.conf.all.accept_redirects',            value: '0' }
        - { name: 'net.ipv6.conf.default.accept_redirects',        value: '0' }
        - { name: 'net.ipv6.conf.all.accept_source_route',         value: '0' }
        - { name: 'net.ipv6.conf.default.accept_source_route',     value: '0' }
        - { name: 'net.ipv6.conf.all.forwarding',                  value: '{{ kernel_ip_forward_v6 }}' }
        - { name: 'net.ipv6.conf.default.forwarding',              value: '{{ kernel_ip_forward_v6 }}' }

        # -- Kernel protection --
        - { name: 'kernel.randomize_va_space',                     value: '2' }
        - { name: 'kernel.dmesg_restrict',                         value: '1' }
        - { name: 'kernel.yama.ptrace_scope',                      value: '1' }
        - { name: 'fs.suid_dumpable',                              value: '0' }
        - { name: 'fs.protected_hardlinks',                        value: '1' }
        - { name: 'fs.protected_symlinks',                         value: '1' }
      tags: [sysctl]

    # ═══════════════════════════════════════════════════
    #  BLOCK 15: DISABLE CORE DUMPS
    # ═══════════════════════════════════════════════════

    - name: "[15] Disable core dumps via limits.conf"
      ansible.builtin.lineinfile:
        path: /etc/security/limits.conf
        regexp: '^\*.*core'
        line: '*                hard    core            0'
      tags: [coredump]

    - name: "[15] Ensure coredump.conf.d directory exists"
      ansible.builtin.file:
        path: /etc/systemd/coredump.conf.d
        state: directory
        mode: '0755'
      tags: [coredump]

    - name: "[15] Disable core dumps via systemd-coredump"
      ansible.builtin.copy:
        dest: /etc/systemd/coredump.conf.d/disable.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          [Coredump]
          Storage=none
          ProcessSizeMax=0
      tags: [coredump]

    # ═══════════════════════════════════════════════════
    #  BLOCK 16: MOUNT OPTIONS (/dev/shm + /home)
    # ═══════════════════════════════════════════════════

    - name: "[16] Mount /dev/shm with nodev,nosuid,noexec"
      ansible.posix.mount:
        path: /dev/shm
        src: tmpfs
        fstype: tmpfs
        opts: "defaults,nodev,nosuid,noexec,size={{ shm_size }}"
        state: mounted
      tags: [mount]

    - name: "[16] Remount /home with nodev,nosuid if separate partition"
      ansible.builtin.shell: |
        if findmnt /home > /dev/null 2>&1; then
          mount -o remount,nodev,nosuid /home
        fi
      changed_when: false
      tags: [mount]

    # ═══════════════════════════════════════════════════
    #  BLOCK 17: JOURNALD
    # ═══════════════════════════════════════════════════

    - name: "[17] Install systemd-journal-remote"
      ansible.builtin.dnf:
        name: systemd-journal-remote
        state: present
      tags: [journald]

    - name: "[17] Create journald config drop-in directory"
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        owner: root
        group: root
        mode: '0755'
      tags: [journald]

    - name: "[17] Configure journald (compress + persistent storage)"
      ansible.builtin.copy:
        dest: /etc/systemd/journald.conf.d/hardening.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          [Journal]
          Compress=yes
          Storage=persistent
          ForwardToSyslog=no
      notify: restart journald
      tags: [journald]

    - name: "[17] Disable journal-remote socket"
      ansible.builtin.systemd:
        name: systemd-journal-remote.socket
        enabled: false
        state: stopped
      failed_when: false
      tags: [journald]

    # ═══════════════════════════════════════════════════
    #  BLOCK 18: CRON / AT HARDENING
    # ═══════════════════════════════════════════════════

    - name: "[18] Create cron.allow (root only)"
      ansible.builtin.copy:
        dest: /etc/cron.allow
        content: "root\n"
        owner: root
        group: root
        mode: '0600'
      tags: [cron]

    - name: "[18] Create at.allow (root only)"
      ansible.builtin.copy:
        dest: /etc/at.allow
        content: "root\n"
        owner: root
        group: root
        mode: '0600'
      tags: [cron]

    - name: "[18] Remove cron.deny"
      ansible.builtin.file:
        path: /etc/cron.deny
        state: absent
      tags: [cron]

    - name: "[18] Remove at.deny"
      ansible.builtin.file:
        path: /etc/at.deny
        state: absent
      tags: [cron]

    - name: "[18] Set cron directories to mode 0700"
      ansible.builtin.file:
        path: "{{ item }}"
        mode: '0700'
        owner: root
        group: root
      loop:
        - /etc/cron.d
        - /etc/cron.daily
        - /etc/cron.hourly
        - /etc/cron.weekly
        - /etc/cron.monthly
      failed_when: false
      tags: [cron]

    - name: "[18] Set crontab to mode 0600"
      ansible.builtin.file:
        path: /etc/crontab
        mode: '0600'
        owner: root
        group: root
      tags: [cron]

    # ═══════════════════════════════════════════════════
    #  BLOCK 19: DISABLE UNNECESSARY SERVICES
    # ═══════════════════════════════════════════════════

    - name: "[19] Disable unnecessary services"
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: false
        state: stopped
      loop: "{{ services_to_disable }}"
      failed_when: false
      tags: [services]

    # ═══════════════════════════════════════════════════
    #  BLOCK 20: AIDE – FILE INTEGRITY MONITORING
    # ═══════════════════════════════════════════════════

    - name: "[20] Install AIDE"
      ansible.builtin.dnf:
        name: aide
        state: present
      tags: [aide]

    - name: "[20] Configure AIDE to verify audit tools"
      ansible.builtin.lineinfile:
        path: /etc/aide.conf
        line: "{{ item }}"
        insertafter: EOF
      loop:
        - '/usr/sbin/auditctl p+i+n+u+g+s+b+acl+xattrs+sha512'
        - '/usr/sbin/auditd p+i+n+u+g+s+b+acl+xattrs+sha512'
        - '/usr/sbin/ausearch p+i+n+u+g+s+b+acl+xattrs+sha512'
        - '/usr/sbin/aureport p+i+n+u+g+s+b+acl+xattrs+sha512'
        - '/usr/sbin/autrace p+i+n+u+g+s+b+acl+xattrs+sha512'
        - '/usr/sbin/augenrules p+i+n+u+g+s+b+acl+xattrs+sha512'
      tags: [aide]

    - name: "[20] Initialize AIDE database (takes ~2 min)"
      ansible.builtin.command:
        cmd: aide --init
        creates: /var/lib/aide/aide.db.new.gz
      tags: [aide]

    - name: "[20] Activate AIDE database"
      ansible.builtin.copy:
        src: /var/lib/aide/aide.db.new.gz
        dest: /var/lib/aide/aide.db.gz
        remote_src: yes
      tags: [aide]

    - name: "[20] Schedule daily AIDE check via cron"
      ansible.builtin.cron:
        name: "AIDE daily integrity check"
        minute: "{{ aide_cron_minute }}"
        hour: "{{ aide_cron_hour }}"
        job: "/usr/sbin/aide --check"
        user: root
      tags: [aide]

    # ═══════════════════════════════════════════════════
    #  BLOCK 21: AUDITD – COMPLETE CIS L2 RULES
    # ═══════════════════════════════════════════════════

    - name: "[21] Install auditd"
      ansible.builtin.dnf:
        name:
          - audit
          - audit-libs
        state: present
      tags: [audit]

    - name: "[21] Enable auditd service"
      ansible.builtin.systemd:
        name: auditd
        enabled: true
        state: started
      tags: [audit]

    - name: "[21] Configure auditd data retention"
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        backup: yes
      loop:
        - { regexp: '^max_log_file_action',      line: 'max_log_file_action = keep_logs' }
        - { regexp: '^space_left_action',        line: 'space_left_action = email' }
        - { regexp: '^admin_space_left_action',  line: 'admin_space_left_action = halt' }
        - { regexp: '^disk_full_action',         line: 'disk_full_action = halt' }
        - { regexp: '^disk_error_action',        line: 'disk_error_action = halt' }
      tags: [audit]

    - name: "[21] Set audit config file permissions to 0640"
      ansible.builtin.shell: |
        find /etc/audit/ -name '*.conf' -o -name '*.rules' | xargs chmod 0640
      changed_when: true
      tags: [audit]

    # RHEL 10 uses BLS (Boot Loader Specification) — grubby writes
    # directly to /boot/loader/entries/, grub2-mkconfig alone won't work.
    - name: "[21] Check current kernel boot args"
      ansible.builtin.shell:
        cmd: "grubby --info=DEFAULT | grep args"
      register: grubby_check
      changed_when: false
      tags: [audit]

    - name: "[21] Enable audit at boot via grubby (audit=1)"
      ansible.builtin.command:
        cmd: grubby --update-kernel=ALL --args='audit=1'
      when: "'audit=1' not in grubby_check.stdout"
      tags: [audit]

    - name: "[21] Enable audit backlog limit via grubby"
      ansible.builtin.command:
        cmd: "grubby --update-kernel=ALL --args='audit_backlog_limit={{ audit_backlog_limit }}'"
      when: "'audit_backlog_limit' not in grubby_check.stdout"
      tags: [audit]

    - name: "[21] Deploy CIS L2 audit rules"
      ansible.builtin.copy:
        dest: /etc/audit/rules.d/99-cis-hardening.rules
        backup: yes
        owner: root
        group: root
        mode: '0640'
        content: |
          ## ============================================================
          ## CIS RHEL 10 L2 – Complete Audit Rules
          ## ============================================================

          ## Clear existing rules
          -D

          ## Increase buffer size
          -b {{ audit_buffer_size }}

          ## Continue on errors
          -c

          ## -- Time changes --
          -a always,exit -F arch=b64 -S adjtimex -S settimeofday -S clock_settime -k time-change
          -a always,exit -F arch=b32 -S adjtimex -S settimeofday -S stime -S clock_settime -k time-change
          -w /etc/localtime -p wa -k time-change

          ## -- Identity / user management --
          -w /etc/passwd -p wa -k identity
          -w /etc/shadow -p wa -k identity
          -w /etc/group -p wa -k identity
          -w /etc/gshadow -p wa -k identity
          -w /etc/security/opasswd -p wa -k identity
          -w /etc/nsswitch.conf -p wa -k identity
          -w /etc/pam.conf -p wa -k identity
          -w /etc/pam.d/ -p wa -k identity

          ## -- Network configuration --
          -a always,exit -F arch=b64 -S sethostname -S setdomainname -k system-locale
          -a always,exit -F arch=b32 -S sethostname -S setdomainname -k system-locale
          -w /etc/hostname -p wa -k system-locale
          -w /etc/hosts -p wa -k system-locale
          -w /etc/issue -p wa -k system-locale
          -w /etc/issue.net -p wa -k system-locale
          -w /etc/sysconfig/network -p wa -k system-locale
          -w /etc/NetworkManager/ -p wa -k system-locale
          -w /etc/NetworkManager/system-connections/ -p wa -k system-locale

          ## -- SELinux / MAC policy --
          -w /etc/selinux/ -p wa -k MAC-policy
          -w /usr/share/selinux/ -p wa -k MAC-policy

          ## -- Login / logout events --
          -w /var/log/lastlog -p wa -k logins
          -w /var/run/faillock/ -p wa -k logins

          ## -- Session initiation --
          -w /var/run/utmp -p wa -k session
          -w /var/log/wtmp -p wa -k logins
          -w /var/log/btmp -p wa -k logins

          ## -- DAC / permission changes (chmod, chown, xattr) --
          -a always,exit -F arch=b64 -S chmod -S fchmod -S fchmodat -S fchmodat2 -F auid>=1000 -F auid!=unset -k perm_mod
          -a always,exit -F arch=b32 -S chmod -S fchmod -S fchmodat -S fchmodat2 -F auid>=1000 -F auid!=unset -k perm_mod
          -a always,exit -F arch=b64 -S chown -S fchown -S fchownat -S lchown -F auid>=1000 -F auid!=unset -k perm_mod
          -a always,exit -F arch=b32 -S chown -S fchown -S fchownat -S lchown -F auid>=1000 -F auid!=unset -k perm_mod
          -a always,exit -F arch=b64 -S setxattr -S lsetxattr -S fsetxattr -S removexattr -S lremovexattr -S fremovexattr -F auid>=1000 -F auid!=unset -k perm_mod
          -a always,exit -F arch=b32 -S setxattr -S lsetxattr -S fsetxattr -S removexattr -S lremovexattr -S fremovexattr -F auid>=1000 -F auid!=unset -k perm_mod

          ## -- File deletion events --
          -a always,exit -F arch=b64 -S unlink -S unlinkat -S rename -S renameat -S renameat2 -F auid>=1000 -F auid!=unset -k delete
          -a always,exit -F arch=b32 -S unlink -S unlinkat -S rename -S renameat -S renameat2 -F auid>=1000 -F auid!=unset -k delete

          ## -- Unauthorized file access attempts --
          -a always,exit -F arch=b64 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=unset -k access
          -a always,exit -F arch=b64 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=unset -k access
          -a always,exit -F arch=b32 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=unset -k access
          -a always,exit -F arch=b32 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=unset -k access

          ## -- Kernel module loading/unloading --
          -a always,exit -F arch=b64 -S init_module -S finit_module -S delete_module -S query_module -F auid>=1000 -F auid!=unset -k module_chg
          -a always,exit -F arch=b32 -S init_module -S finit_module -S delete_module -S query_module -F auid>=1000 -F auid!=unset -k module_chg

          ## -- Mount / export to media --
          -a always,exit -F arch=b64 -S mount -F auid>=1000 -F auid!=unset -k mounts
          -a always,exit -F arch=b32 -S mount -F auid>=1000 -F auid!=unset -k mounts

          ## -- ACL commands --
          -a always,exit -F path=/usr/bin/chacl -F perm=x -F auid>=1000 -F auid!=unset -k priv-cmd
          -a always,exit -F path=/usr/bin/setfacl -F perm=x -F auid>=1000 -F auid!=unset -k priv-cmd

          ## -- SELinux commands --
          -a always,exit -F path=/usr/bin/chcon -F perm=x -F auid>=1000 -F auid!=unset -k priv-cmd

          ## -- User management commands --
          -a always,exit -F path=/usr/sbin/usermod -F perm=x -F auid>=1000 -F auid!=unset -k usermod
          -a always,exit -F path=/usr/bin/kmod -F perm=x -F auid>=1000 -F auid!=unset -k module_chg

          ## -- Sudo / admin activity --
          -w /etc/sudoers -p wa -k actions
          -w /etc/sudoers.d/ -p wa -k actions
          -w /var/log/sudo.log -p wa -k actions

          ## -- SSH configuration --
          -w /etc/ssh/sshd_config -p wa -k sshd
          -w /etc/ssh/sshd_config.d/ -p wa -k sshd

          ## -- Privileged execution as another user --
          -a always,exit -F arch=b64 -C euid!=uid -F auid!=unset -S execve -k user_emulation
          -a always,exit -F arch=b32 -C euid!=uid -F auid!=unset -S execve -k user_emulation

          ## -- Maintenance / cron --
          -w /var/spool/cron/ -p wa -k maintenance
          -w /etc/crontab -p wa -k maintenance
          -w /etc/cron.d/ -p wa -k maintenance

          ## -- Make audit config immutable (MUST BE LAST RULE!) --
          -e 2
      notify: reload audit rules
      tags: [audit]

    - name: "[21] Generate audit rules for all privileged (SUID/SGID) binaries"
      ansible.builtin.shell: |
        # Paths already covered in 99-cis-hardening.rules
        SKIP="/usr/bin/chacl|/usr/bin/setfacl|/usr/bin/chcon|/usr/sbin/usermod|/usr/bin/kmod"
        find / -xdev \( -perm -4000 -o -perm -2000 \) -type f 2>/dev/null | \
        grep -Ev "$SKIP" | \
        while read -r f; do
          echo "-a always,exit -F path=$f -F perm=x -F auid>=1000 -F auid!=unset -k privileged"
        done > /etc/audit/rules.d/50-privileged.rules
        chmod 0640 /etc/audit/rules.d/50-privileged.rules
      changed_when: true
      notify: reload audit rules
      tags: [audit]

    # ═══════════════════════════════════════════════════
    #  BLOCK 22: GRUB PASSWORD (manual step)
    # ═══════════════════════════════════════════════════

    # GRUB password must be set interactively:
    #   grub2-setpassword
    # Cannot be safely automated (password would be in plaintext)
    - name: "[22] GRUB – Password reminder"
      ansible.builtin.debug:
        msg: >
          GRUB boot password must be set MANUALLY on the managed node!
          Run: grub2-setpassword
          This prevents unauthorized boot or single-user mode access.
      tags: [grub]

    # ═══════════════════════════════════════════════════
    #  BLOCK 23: FILE OWNERSHIP CLEANUP
    # ═══════════════════════════════════════════════════

    - name: "[23] Assign root group to files without a valid group owner"
      ansible.builtin.shell: |
        find / -xdev -nogroup -exec chgrp root {} \; 2>/dev/null || true
      changed_when: false
      tags: [fileperms]

  ###############################################################
  # HANDLERS
  ###############################################################
  handlers:
    - name: restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted

    - name: reload audit rules
      ansible.builtin.command: augenrules --load
      register: audit_load
      failed_when: >
        audit_load.rc != 0 and
        'Rule exists' not in (audit_load.stderr | default(''))

    - name: apply crypto policy
      ansible.builtin.command: update-crypto-policies --set DEFAULT:CIS

    - name: restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted
