###############################################################
# RHEL 10.1 Hardening Playbook
# Goal: CIS-oriented baseline hardening for managed nodes
# Author: Learning project
###############################################################

- name: RHEL 10.1 Server Hardening
  hosts: managed
  become: true

  ###############################################################
  # Variables
  ###############################################################
  vars:
    # SSH settings
    ssh_port: 22
    ssh_idle_timeout: 300
    ssh_max_auth_tries: 3

    # Password policies
    password_min_length: 12
    password_max_days: 90

    # Kernel networking
    # Default: disabled for hardening
    # Override for Kubernetes nodes via group_vars
    kernel_ip_forward: "0"

    # Packages that must NOT be installed
    packages_to_remove:
      - telnet
      - rsh
      - rsh-server
      - ypbind
      - ypserv
      - tftp
      - tftp-server

    # Services that should be disabled
    services_to_disable:
      - bluetooth
      - avahi-daemon
      - cups

  ###############################################################
  # BLOCK 1: System updates
  ###############################################################
  tasks:
    - name: "[1/7] Update all installed packages"
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: true
      tags: update

    - name: "[1/7] Ensure dnf-automatic is installed"
      ansible.builtin.dnf:
        name: dnf-automatic
        state: present
      tags: update

    - name: "[1/7] Enable automatic installation of updates"
      ansible.builtin.systemd:
        name: dnf-automatic-install.timer
        enabled: true
        state: started
      tags: update

  ###############################################################
  # BLOCK 2: Remove insecure packages
  ###############################################################
    - name: "[2/7] Remove insecure packages"
      ansible.builtin.dnf:
        name: "{{ packages_to_remove }}"
        state: absent
      tags: packages

  ###############################################################
  # BLOCK 3: Ensure SELinux is enforcing
  ###############################################################
    - name: "[3/7] Check SELinux status"
      ansible.builtin.command: getenforce
      register: selinux_status
      changed_when: false
      tags: selinux

    - name: "[3/7] Set SELinux to enforcing (persistent)"
      ansible.builtin.lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        line: 'SELINUX=enforcing'
        backup: yes
      tags: selinux

    - name: "[3/7] Set SELinux to enforcing (runtime)"
      ansible.builtin.command: setenforce 1
      when: selinux_status.stdout != "Enforcing"
      tags: selinux

  ###############################################################
  # BLOCK 4: Harden SSH
  ###############################################################
    - name: "[4/7] SSH - Disable root login"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        backup: yes
      notify: restart sshd
      tags: ssh

    - name: "[4/7] SSH - Disable password authentication"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: restart sshd
      tags: ssh

    - name: "[4/7] SSH - Set idle timeout"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveInterval'
        line: "ClientAliveInterval {{ ssh_idle_timeout }}"
      notify: restart sshd
      tags: ssh

    - name: "[4/7] SSH - Set max authentication attempts"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: "MaxAuthTries {{ ssh_max_auth_tries }}"
      notify: restart sshd
      tags: ssh

    - name: "[4/7] SSH - Disallow empty passwords"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitEmptyPasswords'
        line: 'PermitEmptyPasswords no'
      notify: restart sshd
      tags: ssh

    - name: "[4/7] SSH - Allow secure algorithms only"
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        marker: "# {mark} ANSIBLE MANAGED - Crypto settings"
        block: |
          KexAlgorithms curve25519-sha256,diffie-hellman-group14-sha256
          Ciphers aes256-gcm@openssh.com,chacha20-poly1305@openssh.com
          MACs hmac-sha2-256,hmac-sha2-512
      notify: restart sshd
      tags: ssh

  ###############################################################
  # BLOCK 5: Configure firewall
  ###############################################################
    - name: "[5/7] Install firewalld"
      ansible.builtin.dnf:
        name: firewalld
        state: present
      tags: firewall

    - name: "[5/7] Enable and start firewalld"
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started
      tags: firewall

    - name: "[5/7] Set default zone to drop"
      ansible.posix.firewalld:
        zone: drop
        state: enabled
        permanent: true
      tags: firewall

    - name: "[5/7] Allow SSH in drop zone"
      ansible.posix.firewalld:
        zone: drop
        service: ssh
        state: enabled
        permanent: true
        immediate: true
      tags: firewall

  ###############################################################
  # BLOCK 6: Audit logging
  ###############################################################
    - name: "[6/7] Placeholder - audit logging"
      ansible.builtin.debug:
        msg: "Audit logging block – not implemented yet"
      tags: audit

  ###############################################################
  # BLOCK 7: Password policy & kernel hardening
  ###############################################################
    - name: "[7/7] Placeholder - password & kernel hardening"
      ansible.builtin.debug:
        msg: "Password and kernel hardening block – not implemented yet"
      tags:
        - password
        - sysctl
        - services

  ###############################################################
  # HANDLERS (defined early, implemented later)
  ###############################################################
  handlers:
    - name: restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted

    - name: reload auditd rules
      ansible.builtin.debug:
        msg: "auditd rules reload handler placeholder"
