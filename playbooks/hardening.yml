###############################################################
# RHEL 10.1 Hardening Playbook
# Goal: CIS-oriented baseline hardening for managed nodes
# Author: Learning project
###############################################################

- name: RHEL 10.1 Server Hardening
  hosts: managed
  become: true

  ###############################################################
  # Variables
  ###############################################################
  vars:
    # SSH settings
    ssh_port: 22
    ssh_idle_timeout: 300
    ssh_max_auth_tries: 3

    # Password policies
    password_min_length: 12
    password_max_days: 90

    # Kernel networking
    # Default: disabled for hardening
    # Override for Kubernetes nodes via group_vars
    kernel_ip_forward: "0"

    # Packages that must NOT be installed
    packages_to_remove:
      - telnet
      - rsh
      - rsh-server
      - ypbind
      - ypserv
      - tftp
      - tftp-server

    # Services that should be disabled
    services_to_disable:
      - bluetooth
      - avahi-daemon
      - cups

  ###############################################################
  # BLOCK 1: System updates
  ###############################################################
  tasks:
    - name: "[1/7] Update all installed packages"
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: true
      tags: update

    - name: "[1/7] Ensure dnf-automatic is installed"
      ansible.builtin.dnf:
        name: dnf-automatic
        state: present
      tags: update

    - name: "[1/7] Enable automatic installation of updates"
      ansible.builtin.systemd:
        name: dnf-automatic-install.timer
        enabled: true
        state: started
      tags: update

  ###############################################################
  # BLOCK 2: Remove insecure packages
  ###############################################################
    - name: "[2/7] Remove insecure packages"
      ansible.builtin.dnf:
        name: "{{ packages_to_remove }}"
        state: absent
      tags: packages

  ###############################################################
  # BLOCK 3: Ensure SELinux is enforcing
  ###############################################################
    - name: "[3/7] Check SELinux status"
      ansible.builtin.command: getenforce
      register: selinux_status
      changed_when: false
      tags: selinux

    - name: "[3/7] Set SELinux to enforcing (persistent)"
      ansible.builtin.lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        line: 'SELINUX=enforcing'
        backup: yes
      tags: selinux

    - name: "[3/7] Set SELinux to enforcing (runtime)"
      ansible.builtin.command: setenforce 1
      when: selinux_status.stdout != "Enforcing"
      tags: selinux

  ###############################################################
  # BLOCK 4: Harden SSH
  ###############################################################
    - name: "[4/7] SSH - Disable root login"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        backup: yes
      notify: restart sshd
      tags: ssh

    - name: "[4/7] SSH - Disable password authentication"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: restart sshd
      tags: ssh

    - name: "[4/7] SSH - Set idle timeout"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveInterval'
        line: "ClientAliveInterval {{ ssh_idle_timeout }}"
      notify: restart sshd
      tags: ssh

    - name: "[4/7] SSH - Set max authentication attempts"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: "MaxAuthTries {{ ssh_max_auth_tries }}"
      notify: restart sshd
      tags: ssh

    - name: "[4/7] SSH - Disallow empty passwords"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitEmptyPasswords'
        line: 'PermitEmptyPasswords no'
      notify: restart sshd
      tags: ssh

    - name: "[4/7] SSH - Allow secure algorithms only"
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        marker: "# {mark} ANSIBLE MANAGED - Crypto settings"
        block: |
          KexAlgorithms curve25519-sha256,diffie-hellman-group14-sha256
          Ciphers aes256-gcm@openssh.com,chacha20-poly1305@openssh.com
          MACs hmac-sha2-256,hmac-sha2-512
      notify: restart sshd
      tags: ssh

  ###############################################################
  # BLOCK 5: Configure firewall
  ###############################################################
    - name: "[5/7] Install firewalld"
      ansible.builtin.dnf:
        name: firewalld
        state: present
      tags: firewall

    - name: "[5/7] Enable and start firewalld"
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started
      tags: firewall

    - name: "[5/7] Set default zone to drop"
      ansible.posix.firewalld:
        zone: drop
        state: enabled
        permanent: true
      tags: firewall

    - name: "[5/7] Allow SSH in drop zone"
      ansible.posix.firewalld:
        zone: drop
        service: ssh
        state: enabled
        permanent: true
        immediate: true
      tags: firewall

  ###############################################################
  # BLOCK 6: Configure audit logging
  ###############################################################
    - name: "[6/7] Install auditd"
      ansible.builtin.dnf:
        name: audit
        state: present
      tags: audit

    - name: "[6/7] Enable and start auditd"
      ansible.builtin.systemd:
        name: auditd
        enabled: true
        state: started
      tags: audit

    - name: "[6/7] Write audit rules"
      ansible.builtin.copy:
        dest: /etc/audit/rules.d/hardening.rules
        backup: yes
        content: |
          # Monitor identity files
          -w /etc/passwd -p wa -k identity
          -w /etc/shadow -p wa -k identity
          -w /etc/group -p wa -k identity
          -w /etc/gshadow -p wa -k identity
          -w /etc/sudoers -p wa -k sudo
          -w /etc/sudoers.d/ -p wa -k sudo

          # Login activity
          -w /var/log/lastlog -p wa -k logins
          -w /var/run/faillock/ -p wa -k logins

          # SSH configuration
          -w /etc/ssh/sshd_config -p wa -k sshd

          # All root executions via sudo
          -a always,exit -F arch=b64 -S execve -F euid=0 -k exec_root

          # Network configuration
          -w /etc/hosts -p wa -k network
          -w /etc/sysconfig/network -p wa -k network
      notify: reload audit rules
      tags: audit

  ###############################################################
  # BLOCK 7: Password policy & misc hardening
  ###############################################################
    - name: "[7/7] Install libpwquality"
      ansible.builtin.dnf:
        name: libpwquality
        state: present
      tags: password

    - name: "[7/7] Set password quality policy"
      ansible.builtin.copy:
        dest: /etc/security/pwquality.conf
        backup: yes
        content: |
          # Minimum length
          minlen = {{ password_min_length }}
          # At least 1 digit
          dcredit = -1
          # At least 1 uppercase letter
          ucredit = -1
          # At least 1 lowercase letter
          lcredit = -1
          # At least 1 special character
          ocredit = -1
          # Max 3 consecutive identical characters
          maxrepeat = 3
      tags: password

    - name: "[7/7] Set password expiry"
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_MAX_DAYS'
        line: "PASS_MAX_DAYS   {{ password_max_days }}"
      tags: password

    - name: "[7/7] Kernel hardening via sysctl"
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        # Disable IP forwarding (not a router)
        - { name: 'net.ipv4.ip_forward', value: '0' }
        # SYN flood protection
        - { name: 'net.ipv4.tcp_syncookies', value: '1' }
        # Ignore ICMP redirects
        - { name: 'net.ipv4.conf.all.accept_redirects', value: '0' }
        - { name: 'net.ipv6.conf.all.accept_redirects', value: '0' }
        # Disable source routing
        - { name: 'net.ipv4.conf.all.accept_source_route', value: '0' }
        # Enable reverse path filter
        - { name: 'net.ipv4.conf.all.rp_filter', value: '1' }
        # Enable ASLR
        - { name: 'kernel.randomize_va_space', value: '2' }
        # Restrict core dumps
        - { name: 'fs.suid_dumpable', value: '0' }
      tags: sysctl

    - name: "[7/7] Disable unnecessary services"
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: false
        state: stopped
      loop: "{{ services_to_disable }}"
      failed_when: false
      tags: services

  ###############################################################
  # HANDLERS (defined early, implemented later)
  ###############################################################
  handlers:
    - name: restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted

    - name: reload audit rules
      ansible.builtin.command: augenrules --load
